<title>Tomo · K–12 Prototype — Grade 6 Light</title>
<style>
:root{
  --ground:#F7F8F6; --panel:#FFFFFF; --panel2:#EFF2EF; --line:#DDE3DE; --line2:#CBD3CC;
  --ink:#1D2A28; --ink2:#51625E; --ink3:#7C8B87;
  --accent:#166257; --accent-ink:#0E4A41; --accent-soft:#E2EEEB; --on-accent:#FFFFFF;
  --blue:#3D6FB4; --blue-soft:#E4ECF6;
  --green:#2E7D4F; --green-soft:#E3F0E7;
  --amber:#A85E12; --amber-soft:#F7ECDD;
  --violet:#6455C4; --violet-soft:#ECE9F8;
  --red:#B03A2E; --red-soft:#F8E6E3;
  --shadow:0 1px 2px rgba(29,42,40,.06),0 8px 24px rgba(29,42,40,.07);
  --r:10px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
}
@media (prefers-color-scheme: dark){:root{
  --ground:#141B1A; --panel:#1C2523; --panel2:#232E2C; --line:#2E3B38; --line2:#3B4A46;
  --ink:#E8EDEB; --ink2:#A7B5B1; --ink3:#7C8B87;
  --accent:#4FA995; --accent-ink:#7CC7B6; --accent-soft:#1E332F; --on-accent:#0F1917;
  --blue:#7CA6DC; --blue-soft:#1E2A3A;
  --green:#6FB98B; --green-soft:#1D3226;
  --amber:#D99A55; --amber-soft:#38291A;
  --violet:#A79AE8; --violet-soft:#282343;
  --red:#DC8A80; --red-soft:#3A211E;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{
  --ground:#F7F8F6; --panel:#FFFFFF; --panel2:#EFF2EF; --line:#DDE3DE; --line2:#CBD3CC;
  --ink:#1D2A28; --ink2:#51625E; --ink3:#7C8B87;
  --accent:#166257; --accent-ink:#0E4A41; --accent-soft:#E2EEEB; --on-accent:#FFFFFF;

}
:root[data-theme="dark"]{

  --ink:#E8EDEB; --ink2:#A7B5B1; --ink3:#7C8B87;
  --accent:#4FA995; --accent-ink:#7CC7B6; --accent-soft:#1E332F; --on-accent:#0F1917;
  --blue:#7CA6DC; --blue-soft:#1E2A3A;
  --green:#6FB98B; --green-soft:#1D3226;
  --amber:#D99A55; --amber-soft:#38291A;
  --violet:#A79AE8; --violet-soft:#282343;
  --red:#DC8A80; --red-soft:#3A211E;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--ground);color:var(--ink);font:15px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:.01em;text-wrap:balance}
h1{font-size:26px;line-height:1.25}
h2{font-size:19px;line-height:1.3}
h3{font-size:16px}
.small{font-size:13px;color:var(--ink2)}
.tiny{font-size:12px;color:var(--ink3)}
.num{font-variant-numeric:tabular-nums}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:600}

/* App frame */
#app{min-height:100%;display:flex;flex-direction:column}
.frame{flex:1;display:flex;min-height:0}
.rail{width:216px;flex-shrink:0;border-right:1px solid var(--line);padding:18px 12px;display:flex;flex-direction:column;gap:2px;background:var(--panel)}
.rail .brand{font-family:var(--serif);font-size:20px;font-weight:700;padding:4px 10px 14px;color:var(--accent-ink)}
.rail .brand span{color:var(--ink3);font-weight:400;font-size:13px;display:block;font-family:var(--sans);letter-spacing:.04em}
.navbtn{display:flex;align-items:center;gap:10px;text-align:left;padding:9px 10px;border-radius:8px;color:var(--ink2);font-weight:500;width:100%}
.navbtn:hover{background:var(--panel2)}
.navbtn[aria-current="true"]{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.navbtn .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);margin-left:auto}
.canvas{flex:1;min-width:0;overflow-y:auto;padding:26px 30px 90px}
.canvas-inner{max-width:980px;margin:0 auto}

/* Student frame */
.stu-top{background:var(--panel);border-bottom:1px solid var(--line);padding:0 22px}
.stu-top .row1{display:flex;align-items:center;gap:14px;padding:14px 0 6px}
.stu-top .brand{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--accent-ink)}
.stu-tabs{display:flex;gap:4px}
.stu-tab{padding:9px 14px;border-radius:8px 8px 0 0;color:var(--ink2);font-weight:500;border-bottom:2px solid transparent}
.stu-tab[aria-current="true"]{color:var(--accent-ink);border-bottom-color:var(--accent);font-weight:600}
.stu-canvas{flex:1;overflow-y:auto;padding:24px 22px 90px}
.stu-inner{max-width:760px;margin:0 auto}

/* Cards & layout */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.card.flat{box-shadow:none}
.card + .card{margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:860px){
 .grid2,.grid3{grid-template-columns:1fr}
 .frame{flex-direction:column}
 .rail{width:100%;flex-direction:row;align-items:center;overflow-x:auto;padding:8px 10px;border-right:0;border-bottom:1px solid var(--line);gap:4px}
 .rail .brand{font-size:16px;padding:0 8px;white-space:nowrap}
 .rail .brand span{display:none}
 .navbtn{width:auto;white-space:nowrap;padding:7px 10px;font-size:13px}
 .rail .tiny{display:none}
 .canvas{padding:18px 14px 110px}
}
.hstack{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vstack{display:flex;flex-direction:column;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
hr{border:0;border-top:1px solid var(--line);margin:14px 0}

/* Pills & status */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.plain::before{display:none}
.p-idle{background:var(--panel2);color:var(--ink2)}
.p-prog{background:var(--blue-soft);color:var(--blue)}
.p-done{background:var(--green-soft);color:var(--green)}
.p-supp{background:var(--amber-soft);color:var(--amber)}
.p-ready{background:var(--accent-soft);color:var(--accent-ink)}
.p-mast{background:var(--green-soft);color:var(--green)}
.p-accel{background:var(--violet-soft);color:var(--violet)}
.p-alert{background:var(--red-soft);color:var(--red)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-weight:600;border:1px solid var(--line2);background:var(--panel);color:var(--ink)}
.btn:hover{background:var(--panel2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.subtle{border-color:transparent;color:var(--accent-ink);background:var(--accent-soft)}
.btn.sm{padding:5px 12px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.linkbtn{color:var(--accent-ink);font-weight:600;text-decoration:underline;text-underline-offset:3px}

/* Progress */
.bar{height:8px;border-radius:99px;background:var(--panel2);overflow:hidden;min-width:60px}
.bar>i{display:block;height:100%;border-radius:99px;background:var(--accent)}
.bar.blue>i{background:var(--blue)} .bar.amber>i{background:var(--amber)} .bar.violet>i{background:var(--violet)} .bar.green>i{background:var(--green)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
.rowbtn{cursor:pointer}
.rowbtn:hover td{background:var(--panel2)}
.tablewrap{overflow-x:auto}

/* Learning map */
.mapnode{display:flex;gap:14px;align-items:flex-start;position:relative;padding:0 0 22px 0}
.mapnode::before{content:"";position:absolute;left:13px;top:30px;bottom:-2px;width:2px;background:var(--line2)}
.mapnode:last-child::before{display:none}
.mapdot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--line2);background:var(--panel);color:var(--ink3);z-index:1}
.mapdot.done{background:var(--green);border-color:var(--green);color:#fff}
.mapdot.prog{background:var(--blue);border-color:var(--blue);color:#fff}
.mapdot.supp{background:var(--amber);border-color:var(--amber);color:#fff}
.mapdot.lock{background:var(--panel2)}
.mapdot.accel{background:var(--violet);border-color:var(--violet);color:#fff}
.mapdot.ready{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.mapbody{flex:1;padding-top:2px}

/* Drawer */
.drawer-veil{position:fixed;inset:0;background:rgba(15,25,23,.45);z-index:40}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(480px,94vw);background:var(--panel);z-index:41;box-shadow:var(--shadow);overflow-y:auto;padding:22px 24px;border-left:1px solid var(--line)}
@media (prefers-reduced-motion:no-preference){.drawer{animation:slidein .22s ease}}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* Demo bar */
.demobar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--panel);border-top:1px solid var(--line);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 -4px 16px rgba(0,0,0,.05)}
.demobar .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:700}
.rolebtn{padding:5px 11px;border-radius:99px;border:1px solid var(--line2);font-size:13px;font-weight:600;color:var(--ink2)}
.rolebtn[aria-current="true"]{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}

/* Toasts */
#toasts{position:fixed;bottom:64px;right:18px;z-index:60;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{background:var(--ink);color:var(--ground);padding:10px 14px;border-radius:8px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow)}
@media (prefers-reduced-motion:no-preference){.toast{animation:toastin .25s ease}}
@keyframes toastin{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

/* Lesson player */
.stage-steps{display:flex;gap:6px;margin:10px 0 4px}
.stage-step{flex:1;text-align:center;font-size:12px;font-weight:600;color:var(--ink3);padding:7px 4px;border-radius:7px;background:var(--panel2)}
.stage-step.cur{background:var(--accent);color:var(--on-accent)}
.stage-step.done{background:var(--accent-soft);color:var(--accent-ink)}
.whybox{background:var(--violet-soft);border-radius:8px;padding:12px 14px;font-size:13.5px;color:var(--ink);border-left:3px solid var(--violet)}
.whybox b{color:var(--violet)}
.qopt{display:block;width:100%;text-align:left;padding:11px 14px;border:1px solid var(--line2);border-radius:8px;margin-top:8px;background:var(--panel)}
.qopt:hover{border-color:var(--accent)}
.qopt.correct{border-color:var(--green);background:var(--green-soft)}
.qopt.wrong{border-color:var(--red);background:var(--red-soft)}
.qopt.sel{border-color:var(--accent);background:var(--accent-soft)}
.qopt:disabled{cursor:default}
.feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13.5px}
.feedback.good{background:var(--green-soft);color:var(--green)}
.feedback.bad{background:var(--amber-soft);color:var(--amber)}
.lesson-prose{font-size:15.5px;max-width:62ch}
.lesson-prose p{margin:10px 0}
.lesson-prose .gloss{border-bottom:2px dotted var(--violet);cursor:help;font-weight:600}
.diagram{background:var(--panel2);border-radius:8px;padding:14px;margin:12px 0;text-align:center}
.revtag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);background:var(--blue-soft);padding:2px 8px;border-radius:5px;margin-bottom:6px}

/* Schedule */
.schtabs{display:flex;gap:4px;background:var(--panel2);border-radius:9px;padding:3px;width:max-content}
.schtab{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;color:var(--ink2)}
.schtab[aria-current="true"]{background:var(--panel);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.slot{display:flex;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line);align-items:center}
.slot:last-child{border-bottom:0}
.slot .time{width:86px;flex-shrink:0;font-weight:600;color:var(--ink2)}
.slot.live-now{background:var(--accent-soft);border-radius:8px;padding-left:12px;padding-right:12px}
.blocktag{font-size:11px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:5px}
.bt-cb{background:var(--accent-soft);color:var(--accent-ink)}
.bt-path{background:var(--violet-soft);color:var(--violet)}
.bt-mc{background:var(--amber-soft);color:var(--amber)}

/* Live view */
.livehead{display:flex;align-items:center;gap:12px}
.livedot{width:9px;height:9px;border-radius:50%;background:var(--red)}
@media (prefers-reduced-motion:no-preference){.livedot.on{animation:pulse 1.4s infinite}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.evt{display:flex;gap:10px;padding:7px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
.evt:last-child{border-bottom:0}
.evt .t{color:var(--ink3);font-variant-numeric:tabular-nums;width:46px;flex-shrink:0;font-weight:600}

/* Bloom chips */
.bloomrow{display:flex;gap:6px;flex-wrap:wrap}
.bloom{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;background:var(--panel2);color:var(--ink2);border:1px solid var(--line)}
.bloom.hit{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}

.lockcard{border-style:dashed;color:var(--ink3)}
.unlockcard{border-color:var(--violet);background:var(--violet-soft)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.kpi{padding:14px 16px}
.kpi .v{font-size:24px;font-weight:700;font-family:var(--serif)}
.kpi .l{font-size:12px;color:var(--ink3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
</style>

const SUBTOPICS=[
 {id:"st1",n:1,title:"Seeing objects: sources of light",mins:20,
  goal:"Identify luminous and non-luminous objects and explain that we see things when light enters our eyes.",
  core:"We see an object only when light from it reaches our eyes. Some objects — the Sun, a flame, a glowing bulb — give out their own light. We call them <b>luminous</b>. Most things around us (a book, the Moon, a wall) are <b>non-luminous</b>: we see them because they bounce light from a luminous source into our eyes."},
 {id:"st2",n:2,title:"Light travels in straight lines",mins:20,
  goal:"Show with evidence that light travels in straight lines (rectilinear propagation).",
  core:"Light does not bend around corners on its own. If you look at a candle through a straight pipe you can see it; bend the pipe and the flame disappears. This one idea — <b>light travels in straight lines</b> — explains shadows, pinhole images, and why we can't see around walls."},
 {id:"st3",n:3,title:"Shadows: how and why they form",mins:20,
  goal:"Explain shadow formation using a light source, an opaque object, and a screen, and predict how shadows change.",
  core:"A <b>shadow</b> forms when an opaque object blocks light. Three things are always needed: a source of light, an opaque object, and a screen behind it. A shadow shows the outline of the object — but never its colour or surface detail. Moving the object closer to the source makes the shadow bigger."},
 {id:"st4",n:4,title:"The pinhole camera: images vs shadows",mins:20,
  goal:"Build the idea of an image with a pinhole camera and contrast an image with a shadow.",
  core:"A tiny hole in a box can form a picture of the world — upside-down, in full colour. This is a <b>pinhole image</b>. Unlike a shadow, an image carries colour and detail, and it is inverted — because light from the top of the object travels in a straight line through the hole to the bottom of the screen."},
 {id:"st5",n:5,title:"Mirrors and reflection",mins:20,
  goal:"Describe reflection from a plane mirror and where mirrors redirect light.",
  core:"A mirror does not stop light — it changes its direction. This is <b>reflection</b>. A plane mirror forms an image that is upright and left-right reversed. Periscopes use two mirrors to let light take two right-angle turns, so you can see over a wall."}
];
const PREREQ={id:"g5",title:"Grade 5 · Transparent, translucent and opaque materials",
 desc:"Whether light passes through a material fully, partly, or not at all. Needed before shadows make sense."};

 {id:"g7",grade:7,title:"Light: Reflection and images",

 {id:"g8",grade:8,title:"Light: Refraction and the human eye",
  items:["Refraction: why a pencil bends in water","Lenses and image formation","Structure of the human eye","Dispersion: white light and the spectrum"]}
];

 {bloom:"Analyse",text:"Compare a pinhole image with a shadow and account for the differences."},
 {bloom:"Evaluate",text:"Judge whether an experimental setup can test straight-line travel of light."},
 {bloom:"Create",text:"Design an investigation using mirrors or a pinhole to solve a seeing problem."}
];

 s1:{id:"s1",name:"Sana Kapoor",init:"SK",

  adaptWhy:"Dev's diagnostic flagged a Grade 5 gap on how materials transmit light. Shadows can't be reasoned about without it, so his lessons open with a two-minute prerequisite repair and his practice always retrieves it once. The Grade 6 objective is unchanged."},
 s3:{id:"s3",name:"Meera Nair",init:"MN",

}
function subtopicsDone(sid){return SUBTOPICS.filter(st=>subStatus(state.students[sid].sub[st.id])==="completed").length}

 if(s.mastery.status==="passed")return s.unlocked.length?"accelerated":"mastered";
 if(s.mastery.status==="window")return"ready_mc";
 if(S.paceKey==="behind"||s.extraClasses.length)return"needs_support";
 if(subtopicsDone(sid)===0)return"not_started";
 return"in_progress";
}

 for(const sid of ROSTER){const p=L.per[sid];if(p.phase!=="idle"&&!p.stuck&&Math.random()<0)p.pct=p.pct}

function playerQuestions(sid,stId,kind){
 /* practice: revision item + 2 core; cfu: 2 core + revision item (4 total incl. inline) */
 const rev=QB.rev[stId],core=QB.core[stId];

function nextQ(sid,kind){
 mutate(s=>{
  const P=s.player[sid];const qs=playerQuestions(sid,P.st,kind);
  const q=qs[kind==="practice"?P.practiceIdx:P.cfuIdx];
  const right=P.answered===q.a;
  if(kind==="practice"){if(right)P.practiceRight++;P.practiceIdx++;P.answered=null;
   if(P.practiceIdx>=qs.length){P.stage="cfu";s.students[sid].sub[P.st].practice="done";toast("Practice complete — moving to the Check for Understanding.")}
  }else{if(right)P.cfuRight++;P.cfuIdx++;P.answered=null;
   if(P.cfuIdx>=qs.length){
    const score=Math.round(100*P.cfuRight/qs.length);
    s.students[sid].sub[P.st].cfu={status:"done",score};
    s.students[sid].sub[P.st].learn="done";s.students[sid].sub[P.st].practice="done";
    P.stage="done";P.score=score;
    if(score<60)s.students[sid].supports.push({day:s.day,by:"System",what:`CFU on ${SUBTOPICS.find(x=>x.id===P.st).title} below 60% — revision recommended`});
    if(subtopicsDone(sid)===5&&s.students[sid].mastery.status==="locked"){
     s.students[sid].mastery={status:"window",openedDay:s.day,deadlineDay:s.day+8,attempts:[]};
     toast("All subtopics complete — Mastery Check unlocked with an 8-day window.");
    }else{toast(`Check for Understanding saved · ${score}%. Learning Map updated.`)}
   }
  }
 });
}
function playerAdvance(sid){
 mutate(s=>{
  const P=s.player[sid];
  if(P.stage==="revision"){P.stage="learn";P.answered=null}
  else if(P.stage==="learn"){
   const L=lessonFor(sid,SUBTOPICS.find(x=>x.id===P.st));
   const steps=L.chunked?3:1;
   if(P.learnStep<steps-1)P.learnStep++;
   else{P.stage="practice";s.students[sid].sub[P.st].learn="done";toast("Learning material complete — practice unlocked.")}
  }
  else if(P.stage==="done"){
   delete s.player[sid];s.studentView="home";
  }
 });
}

 const stageNames={revision:"Revision",learn:"Learning",practice:"Practice",cfu:"Check"};
 const idx=P.stage==="done"?4:stages.indexOf(P.stage);
 let body="";
 if(P.stage==="revision"){
  const prev=st.n>1?SUBTOPICS[st.n-2]:null;
  const rq=QB.rev[st.id];
  body=`<span class="revtag">Revision first · ${prev?`Subtopic ${prev.n}`:"Grade 5"}</span>
   <h2 style="margin-top:4px">${esc(rq.q.replace(/^\(.*?\)\s*/,""))}</h2>
   ${rq.opts.map((o,i)=>`<button class="qopt ${P.answered!=null?(i===rq.a?"correct":i===P.answered?"wrong":""):""}" data-action="ans" data-i="${i}" ${P.answered!=null?"disabled":""}>${esc(o)}</button>`).join("")}
   ${P.answered!=null?`<div class="feedback ${P.answered===rq.a?"good":"bad"}">${P.answered===rq.a?"✓ ":"Not quite — "}${esc(rq.fb)}</div>
   <div style="margin-top:14px"><button class="btn primary" data-action="player-advance">Start today's learning →</button></div>`:""}`;
 }else if(P.stage==="learn"){
  const chunks=L.chunked?splitChunks(st.core):[st.core];
  const stepTxt=chunks[Math.min(P.learnStep,chunks.length-1)];
  body=`
   <div class="whybox"><b>Why this version?</b> ${esc(L.why)}</div>
   <div class="lesson-prose" style="margin-top:14px">
    ${L.diagramFirst?diagramFor(st.id):""}
    ${L.prereq&&st.n<=3?`<div class="card flat" style="background:var(--amber-soft);border-color:transparent;margin-bottom:12px"><span class="revtag" style="color:var(--amber);background:transparent;padding:0">Quick repair · Grade 5</span><p class="small" style="margin-top:4px"><b>Transparent</b> lets all light through (glass). <b>Translucent</b> lets some through, scattered (butter paper). <b>Opaque</b> blocks it (wood). Only opaque objects make dark, sharp shadows.</p></div>`:""}
    <p>${L.gloss?glossify(stepTxt):stepTxt}</p>
    ${!L.diagramFirst?diagramFor(st.id):""}
    ${L.extra?`<div class="card flat" style="background:var(--panel2);border-color:transparent"><p class="small">${esc(L.extra)}</p></div>`:""}
   </div>
   ${L.chunked?`<p class="tiny" style="margin-top:10px">Step ${P.learnStep+1} of ${chunks.length} — one idea at a time. Sentence starter for your notebook: <i>“The image is upside-down because light…”</i></p>`:""}
   <div class="hstack" style="margin-top:14px">
    <button class="btn primary" data-action="player-advance">${L.chunked&&P.learnStep<chunks.length-1?"Got it — next step":"Done — go to practice"}</button>
    <button class="btn" data-action="toast" data-msg="Tomoé: “Look at the diagram — follow ONE straight line from the top of the tree through the hole. Where does it land?”">Ask Tomoé for a hint</button>
    <button class="btn" data-action="toast" data-msg="Ms. Iyer has been notified — she can see exactly which step you're on.">Request help</button>
   </div>`;
 }else if(P.stage==="practice"||P.stage==="cfu"){
  const kind=P.stage,qs=playerQuestions(sid,P.st,kind);
  const qi=kind==="practice"?P.practiceIdx:P.cfuIdx;
  const q=qs[qi];
  body=`
   ${kind==="cfu"?`<p class="tiny" style="margin-bottom:8px">This check is saved to your Learning Map. ${sid==="s3"?"Key words are glossed for you — the questions are the same as everyone's.":""}</p>`:""}
   ${q.rev?`<span class="revtag">Revision item</span>`:""}
   <div class="tiny num" style="margin-bottom:4px">${kind==="practice"?"Practice":"Check for Understanding"} · question ${qi+1} of ${qs.length}</div>
   <h2>${esc(q.q.replace(/^\(.*?\)\s*/,""))}</h2>
   ${q.opts.map((o,i)=>`<button class="qopt ${P.answered!=null?(i===q.a?"correct":i===P.answered?"wrong":""):""}" data-action="ans" data-i="${i}" ${P.answered!=null?"disabled":""}>${esc(o)}</button>`).join("")}
   ${P.answered!=null?`<div class="feedback ${P.answered===q.a?"good":"bad"}">${P.answered===q.a?"✓ ":"Not quite — "}${esc(q.fb||"Check the idea and try the next one.")}</div>
   <div style="margin-top:14px"><button class="btn primary" data-action="nextq" data-kind="${kind}">${qi+1>=qs.length?(kind==="practice"?"Finish practice →":"Finish check →"):"Next question →"}</button></div>`:""}`;
 }else{ /* done */
  const score=P.score;
  body=`<h2>${score>=60?"Subtopic complete ✓":"Saved — let's revisit this one"}</h2>
   <p class="small" style="margin:8px 0">Check for Understanding: <b class="num">${score}%</b>. ${score>=60?"Your Learning Map has been updated and the next subtopic is open.":"Below 60% — a revision recommendation was added to your map and your teacher can see it."}</p>
   <div class="hstack">
    ${currentSubtopic(sid)?`<button class="btn primary" data-action="next-subtopic">Continue to the next subtopic</button>`:`<button class="btn primary" data-action="sview" data-v="mastery">Mastery Check is unlocked →</button>`}
    <button class="btn" data-action="sview" data-v="map">See my Learning Map</button>
   </div>`;
 }
 return `
  <div class="eyebrow">Concept Block · Light</div>
  <h1>Subtopic ${st.n}: ${st.title}</h1>
  <div class="stage-steps">${stages.map((sg,i)=>`<div class="stage-step ${i===idx?"cur":i<idx?"done":""}">${stageNames[sg]}${sg==="practice"||sg==="cfu"?" ·incl. revision":""}</div>`).join("")}</div>
  <p class="tiny" style="margin:2px 0 12px">Your progress is saved automatically — leave any time and resume here.</p>
  <div class="card">${body}</div>`;
}
function splitChunks(txt){
 const parts=txt.split(". ");
 const per=Math.ceil(parts.length/3);
 const out=[];for(let i=0;i<parts.length;i+=per)out.push(parts.slice(i,i+per).join(". ")+(i+per<parts.length?".":""));
 return out.slice(0,3);
}
function glossify(txt){
 const G={luminous:"gives out its own light",opaque:"blocks light completely",translucent:"lets some light through, blurred",transparent:"lets all light through",inverted:"upside-down",image:"a picture made by light",reflection:"light bouncing off and changing direction",shadow:"dark shape where light is blocked",screen:"surface the light lands on"};
 let out=txt;
 for(const[w,d]of Object.entries(G))out=out.replace(new RegExp(`\\b(${w})\\b`,"i"),`<span class="gloss" title="${d}">$1</span>`);
 return out+`<span class="tiny" style="display:block;margin-top:8px">Dotted words have plain-language meanings — hover or tap them.</span>`;
}
function diagramFor(stId){
 const svgs={
  st4:`<div class="diagram"><svg viewBox="0 0 320 120" width="100%" style="max-width:360px" role="img" aria-label="Pinhole camera ray diagram"><line x1="40" y1="20" x2="250" y2="95" stroke="var(--amber)" stroke-width="2"/><line x1="40" y1="95" x2="250" y2="25" stroke="var(--blue)" stroke-width="2"/><rect x="140" y="10" width="6" height="42" fill="var(--ink3)"/><rect x="140" y="66" width="6" height="44" fill="var(--ink3)"/><line x1="40" y1="20" x2="40" y2="95" stroke="var(--green)" stroke-width="5"/><line x1="250" y1="25" x2="250" y2="95" stroke="var(--line2)" stroke-width="3"/><text x="28" y="112" font-size="11" fill="var(--ink2)">object</text><text x="128" y="118" font-size="11" fill="var(--ink2)">pinhole</text><text x="232" y="118" font-size="11" fill="var(--ink2)">screen</text></svg><div class="tiny">Two straight lines cross at the hole — top lands at the bottom. That's why the image is inverted.</div></div>`,
  st3:`<div class="diagram"><svg viewBox="0 0 320 110" width="100%" style="max-width:360px" role="img" aria-label="Shadow formation"><circle cx="30" cy="55" r="14" fill="var(--amber)"/><rect x="150" y="35" width="10" height="40" rx="2" fill="var(--ink3)"/><line x1="42" y1="45" x2="150" y2="37" stroke="var(--amber)" stroke-width="1.5"/><line x1="42" y1="65" x2="150" y2="73" stroke="var(--amber)" stroke-width="1.5"/><rect x="270" y="10" width="6" height="90" fill="var(--line2)"/><rect x="270" y="32" width="6" height="48" fill="var(--ink)"/><text x="14" y="95" font-size="11" fill="var(--ink2)">source</text><text x="138" y="95" font-size="11" fill="var(--ink2)">opaque object</text><text x="252" y="108" font-size="11" fill="var(--ink2)">screen + shadow</text></svg></div>`
 };
 return svgs[stId]||svgs.st3;
}
function sMastery(){
 const sid=state.activeStudent,s=state.students[sid],m=s.mastery;
 const eligible=m.status!=="locked";
 const last=m.attempts&&m.attempts.length?m.attempts[m.attempts.length-1]:null;
 return `
  <div class="eyebrow">Mastery Check · Light (Grade 6)</div>
  <h1>Show what you've mastered</h1>
  <div class="card" style="margin-top:14px">
   <div class="spread"><h3>Eligibility</h3>${eligible?pill(m.status==="passed"?"mastered":"ready_mc"):pill("not_started")}</div>
   <p class="small" style="margin-top:6px">${eligible?
     m.status==="passed"?`Passed on day ${m.passedDay} with <b class="num">${last.score}%</b>. Grade 7 resources are unlocked on your Learning Map.`:
     `All five subtopics are complete. Your window opened on day ${m.openedDay} and closes on <b>day ${m.deadlineDay}</b> — ${m.deadlineDay-state.day} days left. The check happens in class, supervised by Ms. Iyer (today's slot: 11:30).`:
     `Complete all five subtopics first — you're at ${subtopicsDone(sid)} of 5. The check unlocks automatically, then you get a 7–10 day window to prepare and attempt it.`}</p>
  </div>
  <div class="card">
   <h3>What it assesses — objectives × Bloom's levels</h3>
   <div class="vstack" style="margin-top:10px">
   ${OBJECTIVES.map(o=>`<div class="spread"><span class="small" style="max-width:56ch">${o.text}</span><span class="bloom hit">${o.bloom}</span></div>`).join("")}
   </div>
  </div>
  ${eligible&&m.status!=="passed"?`<div class="card">
   <h3>Prepare, then attempt</h3>
   <p class="small" style="margin:6px 0 10px">Suggested revision from your map: <b>Subtopic 2</b> (straight lines — your slowest check) and <b>Subtopic 4</b> (images vs shadows). You can reopen any learning or practice material, and ask Tomoé or Ms. Iyer while preparing — the check itself is done on your own.</p>
   <div class="hstack">
    <button class="btn" data-action="sview" data-v="block">Revisit material</button>
    <button class="btn" data-action="toast" data-msg="Tomoé: “Let's warm up — explain to me in one sentence why a shadow has no colour.”">Prepare with Tomoé</button>
    <button class="btn primary" data-action="start-mc">Begin supervised attempt</button>
   </div>
   ${last&&!last.pass?`<hr><p class="small">Previous attempt: day ${last.day} · <b class="num">${last.score}%</b> — revision plan assigned; the window stays open.</p>`:""}
  </div>`:""}
  ${m.status==="passed"?`<div class="card unlockcard">
   <h3>★ Unlocked: Grade 7 · ${ADV[0].title}</h3>
   <ul class="small" style="padding-left:18px;margin-top:8px;display:flex;flex-direction:column;gap:5px">${ADV[0].items.map(i=>`<li>${i}</li>`).join("")}</ul>
   <p class="tiny" style="margin-top:10px">Grade 8 (Refraction & the eye) unlocks after the Grade 7 strand.</p>
  </div>`:""}`;
}
function sMCRun(){
 const R=state.mcRun;if(!R)return sMastery();
 if(R.idx>=MC_ITEMS.length){
  return `<div class="card" style="margin-top:20px;text-align:center;padding:34px">
   <div class="eyebrow">Mastery Check · result</div>
   <h1 style="margin:10px 0">${R.doneScore}%</h1>
   ${R.donePass?`<p class="small" style="max-width:46ch;margin:0 auto">Mastered. Your Learning Map now shows this topic complete — and <b>Grade 7: Light — Reflection and images</b> is unlocked.</p>`:`<p class="small" style="max-width:46ch;margin:0 auto">Below the 80% mastery bar. A targeted revision plan was added to your map; your window is still open for another attempt.</p>`}
   <div class="hstack" style="justify-content:center;margin-top:16px">
    <button class="btn primary" data-action="mc-close">${R.donePass?"See my Learning Map":"Back to preparation"}</button>
   </div></div>`;
 }
 const item=MC_ITEMS[R.idx];
 return `
  <div class="eyebrow">Supervised Mastery Check · in class · Ms. Iyer present</div>
  <h1>Light — Grade 6</h1>
  <p class="tiny" style="margin:4px 0 12px">Question ${R.idx+1} of ${MC_ITEMS.length} · assessing <b>${item.bloom}</b>. Tomoé is unavailable during the check.</p>
  <div class="card">
   <h2>${esc(item.q)}</h2>
   ${item.opts.map((o,i)=>`<button class="qopt ${i===R.answered?"sel":""}" data-action="mc-ans" data-i="${i}">${esc(o)}</button>`).join("")}
   ${R.answered!=null?`<div style="margin-top:14px"><button class="btn primary" data-action="mc-next">${R.idx+1>=MC_ITEMS.length?"Submit check":"Next →"}</button></div>`:""}
   <p class="tiny" style="margin-top:12px">No per-question feedback during a Mastery Check — results come at the end.</p>
  </div>`;
}

/* ============================= APP SHELL ============================= */
function demoBar(){
 return `<div class="demobar">
  <span class="lbl">Demo · view as</span>
  <button class="rolebtn" data-action="role-teacher" aria-current="${state.role==="teacher"}">Ms. Iyer (teacher)</button>
  ${ROSTER.map(sid=>`<button class="rolebtn" data-action="role-student" data-s="${sid}" aria-current="${state.role==="student"&&state.activeStudent===sid}">${STUDENTS[sid].name.split(" ")[0]}</button>`).join("")}
  <span style="flex:1"></span>
  <span class="tiny num">Topic window · day ${state.day}/${WINDOW_DAYS}</span>
  <button class="btn sm" data-action="advance-day">Next day →</button>
  <button class="btn sm" data-action="reset">Reset demo</button>
 </div>`;
}
function render(){
 const app=document.getElementById("app");
 let html="";
 if(state.role==="teacher"){
  const view={home:tHome,class:tClass,live:tLive,progress:tProgress}[state.teacherView]||tHome;
  html=`<div class="frame">${tNav()}<main class="canvas">${view()}</main></div>${tDrawer()}`;
 }else{
  const view={home:sHome,block:sBlock,mastery:sMastery,map:()=> `<div>${learningMapHTML(state.activeStudent,false)}</div>`,mcrun:sMCRun}[state.studentView]||sHome;
  html=`<div class="frame" style="flex-direction:column">${sFrame(view())}</div>`;
 }
 app.innerHTML=html+demoBar();
}

/* ============================= EVENTS ============================= */
document.addEventListener("click",e=>{
 const el=e.target.closest("[data-action]");if(!el)return;
 const a=el.dataset.action,sid=el.dataset.s;
 switch(a){
  case"tview":mutate(s=>{s.teacherView=el.dataset.v});break;
  case"schview":mutate(s=>{s.schedView=el.dataset.v});break;
  case"sview":mutate(s=>{s.studentView=el.dataset.v});break;
  case"drawer":mutate(s=>{s.drawer=sid});break;
  case"drawer-close":mutate(s=>{s.drawer=null});break;
  case"role-teacher":setRole("teacher");break;
  case"role-student":mutate(s=>{s.role="student";s.activeStudent=sid;s.studentView="home"});break;
  case"preview-student":mutate(s=>{s.role="student";s.activeStudent=sid;s.studentView="home";s.drawer=null});toast(`Viewing as ${STUDENTS[sid].name} — use the demo bar to return to the teacher view.`);break;
  case"live-start":startLive();break;
  case"live-pause":pauseLive();break;
  case"live-tick":liveTickOnce();break;
  case"live-reset":stopLive(true);break;
  case"assign-support":assignSupport(sid,{s4:"2-minute ray-diagram walk-through at the pinhole step; retry unaided",s2:"Materials tray sort (transparent/translucent/opaque) before retrying practice",s3:"Confirmed glossary term; no further action needed",s1:"Stretch prompt: annotate diagram with crossing rays",s5:"Confirmed 11:30 supervised Mastery Check slot"}[sid]||"Teacher check-in");break;
  case"assign-practice":mutate(s=>{s.students[sid].supports.push({day:s.day,by:"Ms. Iyer",what:"Assigned extra practice set (3 scaffolded items) on the current subtopic"})});toast(`Extra practice assigned to ${STUDENTS[sid].name}.`);break;
  case"extra-class":scheduleExtraClass(sid);break;
  case"advance-day":advanceDay();break;
  case"reset":resetAll();break;
  case"toast":toast(el.dataset.msg);break;
  case"ans":answerQ(state.activeStudent,null,parseInt(el.dataset.i));break;
  case"nextq":nextQ(state.activeStudent,el.dataset.kind);break;
  case"player-advance":playerAdvance(state.activeStudent);break;
  case"next-subtopic":startNextSubtopic(state.activeStudent);break;
  case"start-mc":startMC(state.activeStudent);break;
  case"mc-ans":answerMC(parseInt(el.dataset.i));break;
  case"mc-next":nextMC();break;
 }
});
document.addEventListener("keydown",e=>{
 if(e.key==="Escape"&&state.drawer)mutate(s=>{s.drawer=null});
 if((e.key==="Enter"||e.key===" ")&&e.target.matches('[role="button"][data-action]')){e.preventDefault();e.target.click()}
});
if(state.live.running){liveTimer=setInterval(liveTickOnce,1500)}
render();

</script>
